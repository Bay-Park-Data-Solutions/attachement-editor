<!DOCTYPE html>
<html>
<head>
    <title>Processing Login...</title>
</head>
<body>
    <p>Redirecting you back to the app...</p>
    <script>
        // Get the full URL including the hash with the access token
        const fullUrl = window.location.href;
        
        // Extract just the hash part (everything after #)
        const hash = window.location.hash;
        
        // The OAuth response comes in the hash, redirect back to index with it
        if (hash) {
            // Redirect to the root with the token hash preserved
            window.location.href = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1) + hash;
        } else {
            // No token, redirect to main page
            window.location.href = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        }
    </script>
</body>
</html>
